server:
  port: ${SERVER_PORT:8080}

spring:
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/textlink}
    username: ${DB_USERNAME:textlink}
    password: ${DB_PASSWORD:textlink}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-change-it-before-production-1234567890}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}
  cookie:
    secure: ${COOKIE_SECURE:false}
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:5173}
  cleanup:
    fixed-delay-ms: ${CLEANUP_FIXED_DELAY_MS:60000}
    initial-delay-ms: ${CLEANUP_INITIAL_DELAY_MS:10000}
