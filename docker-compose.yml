services:
  database:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: textlink
      POSTGRES_USER: textlink
      POSTGRES_PASSWORD: textlink
    volumes:
      - textlink-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U textlink -d textlink"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DB_URL: jdbc:postgresql://database:5432/textlink
      DB_USERNAME: textlink
      DB_PASSWORD: textlink
      JWT_SECRET: change-this-secret-before-production-12345678901234567890
      COOKIE_SECURE: "false"
      CORS_ALLOWED_ORIGIN: http://localhost:8080
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  textlink-postgres-data:
